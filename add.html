<!DOCTYPE html>
<html lang="pt">
<head>
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="icon" type="image/png" href="./favicon.ico">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Transação – Quantova</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="add-body">
  <nav class="nav">
    <div class="nav-left">
      <img src="./apple-touch-icon.png" class="logo" style="border-radius:10px;width:32px;height:32px;object-fit:cover;" />
      <span class="brand">Quantova</span>
    </div>
  </nav>

  <div class="add-container">
    <h2>Nova Transação</h2>
    <p class="subtitle">Regista uma despesa ou receita</p>

    <div class="form-box">
      <form id="formAdd">

        <label>Tipo</label>
        <input type="hidden" id="tipo" value="despesa" />
        <div style="display:flex;gap:10px;margin-bottom:10px;">
          <button type="button" id="btnDespesa" class="cat-btn active"
            style="flex:1;flex-direction:row;justify-content:center;gap:8px;"
            onclick="setTipo('despesa')">🪙 Despesa</button>
          <button type="button" id="btnReceita" class="cat-btn"
            style="flex:1;flex-direction:row;justify-content:center;gap:8px;"
            onclick="setTipo('receita')">💰 Receita</button>
        </div>

        <label for="valor">Valor</label>
        <input type="number" id="valor" class="input-grande" placeholder="0.00" min="0.01" step="0.01" required />

        <label for="descricao">Descrição (opcional)</label>
        <input type="text" id="descricao" class="input-normal" placeholder="Ex: Jantar com amigos" />

        <label for="data">Data</label>
        <input type="date" id="data" class="input-normal" required />

        <label for="categoria">Categoria</label>
        <select id="categoria" class="input-normal" required style="cursor:pointer;"></select>

        <button type="submit" class="btn-submit">Guardar</button>
        <button type="button" class="btn-voltar" onclick="window.location.href='index.html'">← Voltar</button>

      </form>
    </div>
  </div>

  <script src="./db-local.js"></script>
  <script src="./settings.js"></script>
  <script src="./add.js"></script>
</body>
</html>
