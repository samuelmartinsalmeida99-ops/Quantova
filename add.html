<!DOCTYPE html>
<html lang="pt">
<head>
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="icon" type="image/png" href="./favicon.ico">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Transação – Quantova</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="add-body">
  <nav class="nav">
    <div class="nav-left">
      <img
        src="./apple-touch-icon.png"
        class="logo"
        style="border-radius:10px;width:32px;height:32px;object-fit:cover;"
        alt="Logo Quantova"
      />
      <span class="brand">Quantova</span>
    </div>
  </nav>

  <div class="add-container">
    <div class="tx-back">
      <div class="transaction-form">
        <header>
          <h1>Nova Transação</h1>
          <p>Regista uma despesa ou receita</p>
        </header>

        <form id="formAdd">
          <div class="input-section tipo-section">
            <input type="hidden" id="tipo" value="despesa" />

            <div class="tipo-wrap">
              <button type="button" id="btnDespesa" class="tipo-step-btn active">
                🪙 Despesa
              </button>

              <button type="button" id="btnReceita" class="tipo-step-btn">
                💰 Receita
              </button>
            </div>

            <div class="animated-button">
              <span class="icon-holder icon-tipo">🧾</span>
              <button type="button" class="next-button next-tipo" aria-label="Avançar para valor">↑</button>
            </div>
          </div>

          <div class="input-section valor-section folded">
            <input
              type="number"
              id="valor"
              class="valor"
              placeholder="VALOR"
              min="0.01"
              step="0.01"
              required
            />

            <div class="animated-button">
              <span class="icon-holder icon-valor">€</span>
              <button type="button" class="next-button next-valor" aria-label="Avançar para descrição">↑</button>
            </div>
          </div>

          <div class="input-section descricao-section folded">
            <input
              type="text"
              id="descricao"
              class="descricao"
              placeholder="DESCRIÇÃO (OPCIONAL)"
            />

            <div class="animated-button">
              <span class="icon-holder icon-descricao">✎</span>
              <button type="button" class="next-button next-descricao" aria-label="Avançar para data">↑</button>
            </div>
          </div>

          <div class="input-section data-section folded">
            <input
              type="date"
              id="data"
              class="data-input"
              required
            />

            <div class="animated-button">
              <span class="icon-holder icon-data">📅</span>
              <button type="button" class="next-button next-data" aria-label="Avançar para categoria">↑</button>
            </div>
          </div>

          <div class="input-section categoria-section folded">
            <select id="categoria" class="categoria-select" required></select>

            <div class="animated-button">
              <span class="icon-holder icon-categoria">🏷️</span>
              <button type="submit" class="next-button next-submit" aria-label="Guardar transação">✓</button>
            </div>
          </div>

          <div class="success">
            <p>TRANSAÇÃO GUARDADA</p>
          </div>
        </form>

        <button
          type="button"
          class="btn-voltar tx-voltar"
          onclick="window.location.href='index.html'"
        >
          ← Voltar
        </button>
      </div>
    </div>
  </div>

  <script src="./db-local.js"></script>
  <script src="./settings.js"></script>
  <script src="./add.js"></script>
</body>
</html>
